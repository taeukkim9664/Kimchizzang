<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김치프리미엄 실시간 차트</title>
    <link rel="stylesheet" href="css/main.css">
    <!-- TradingView Widget -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 간단한 헤더 -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>김치프리미엄 <span class="highlight">실시간</span></h1>
            </div>
            
            <div class="header-controls">
                <button id="themeToggle" class="theme-toggle">
                    <i class="fas fa-moon"></i>
                    <span>다크모드</span>
                </button>
                <div class="real-time-info">
                    <span class="price-label">현재 김프:</span>
                    <span class="price-value" id="currentKimp">12.5%</span>
                    <span class="price-change positive" id="priceChange">+1.2%</span>
                </div>
            </div>
        </div>
    </header>

    <!-- 메인 콘텐츠 -->
    <main class="main-content">
        <div class="container">
            <!-- 김치프리미엄 차트 -->
            <section class="chart-section">
                <div class="chart-container">
                    <!-- TradingView Widget -->
                    <div class="tradingview-widget-container">
                        <div id="tradingview_chart"></div>
                        <script type="text/javascript">
                        new TradingView.widget({
                            "width": "100%",
                            "height": "500",
                            "symbol": "USDTKRW",
                            "interval": "D",
                            "timezone": "Asia/Seoul",
                            "theme": "light",
                            "style": "1",
                            "locale": "kr",
                            "toolbar_bg": "#f1f3f6",
                            "enable_publishing": false,
                            "allow_symbol_change": true,
                            "container_id": "tradingview_chart"
                        });
                        </script>
                    </div>
                </div>
            </section>
            
            <!-- 거래소 선택 및 설정 -->
            <section class="controls-section">
                <div class="exchange-controls">
                    <div class="exchange-selectors">
                        <div class="selector-group">
                            <label for="domesticExchange"><i class="fas fa-home"></i> 국내 거래소</label>
                            <select id="domesticExchange" class="exchange-select">
                                <option value="upbit">업비트</option>
                                <option value="bithumb">빗썸</option>
                                <option value="coinone">코인원</option>
                                <option value="gopax">고팍스</option>
                            </select>
                        </div>
                        
                        <div class="selector-group">
                            <label for="foreignExchange"><i class="fas fa-globe"></i> 해외 거래소</label>
                            <select id="foreignExchange" class="exchange-select">
                                <option value="binance">바이낸스</option>
                                <option value="binance_futures">바이낸스선물</option>
                                <option value="okx">OKX</option>
                                <option value="okx_futures">OKX선물</option>
                                <option value="bybit">바이빗</option>
                                <option value="bybit_futures">바이빗선물</option>
                                <option value="bitget">비트겟</option>
                                <option value="bitget_futures">비트겟선물</option>
                                <option value="gate">게이트</option>
                                <option value="gate_futures">게이트선물</option>
                            </select>
                        </div>
                        
                        <div class="update-controls">
                            <div class="update-option">
                                <label for="updateInterval">업데이트 주기</label>
                                <select id="updateInterval" class="interval-select">
                                    <option value="500">0.5초</option>
                                    <option value="1000" selected>1초</option>
                                    <option value="2000">2초</option>
                                    <option value="3000">3초</option>
                                    <option value="5000">5초</option>
                                    <option value="10000">10초</option>
                                </select>
                            </div>
                            <div class="search-box">
                                <i class="fas fa-search"></i>
                                <input type="text" id="coinSearch" placeholder="코인 검색">
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            
            <!-- 김치프리미엄 데이터 테이블 -->
            <section class="data-section">
                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th class="sortable" data-sort="name">
                                    이름 <i class="fas fa-sort"></i>
                                </th>
                                <th class="sortable" data-sort="price">
                                    현재가 <i class="fas fa-sort"></i>
                                </th>
                                <th class="sortable" data-sort="kimp">
                                    김프 <i class="fas fa-sort"></i>
                                </th>
                                <th class="sortable" data-sort="change">
                                    전일대비 <i class="fas fa-sort"></i>
                                </th>
                                <th class="sortable" data-sort="volume">
                                    거래대금 <i class="fas fa-sort"></i>
                                </th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody">
                            <!-- 데이터가 여기에 로드됩니다 -->
                            <tr class="loading-row">
                                <td colspan="5">
                                    <div class="loading-spinner">
                                        <i class="fas fa-spinner fa-spin"></i>
                                        데이터를 불러오는 중...
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="table-info">
                    <p><i class="fas fa-sync-alt"></i> <span id="lastUpdate">마지막 업데이트: -</span></p>
                    <p><i class="fas fa-info-circle"></i> 컬럼 헤더를 클릭하면 정렬됩니다.</p>
                </div>
            </section>
        </div>
    </main>

    <!-- 간단한 푸터 -->
    <footer class="footer">
        <div class="container">
            <p>김치프리미엄 실시간 차트 • 참고: theddari.com</p>
            <p class="footer-note">이 사이트는 김치프리미엄 정보를 제공합니다. 투자 조언이 아닙니다.</p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="js/main.js"></script>
</body>
</html>
